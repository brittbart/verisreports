<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Check your email — Verum Signal</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #1a0d2e;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    color: #e7dffb;
  }
  .stage { width: 100%; max-width: 460px; }
  .label {
    font-family: ui-monospace, monospace;
    font-size: 10px; letter-spacing: 0.12em; color: #d4537e;
    text-transform: uppercase; margin-bottom: 8px; padding-left: 4px;
  }
  .panel {
    background: #100820;
    border: 0.5px solid rgba(180, 150, 230, 0.18);
    border-radius: 10px;
    padding: 32px 24px;
    text-align: center;
  }
  .icon-circle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(180, 140, 255, 0.14);
    border: 0.5px solid rgba(180, 140, 255, 0.4);
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: 24px; font-weight: 500; line-height: 1.2;
    margin: 0 0 12px; color: #f3edff;
  }
  h1 .accent { font-style: italic; color: #d4537e; }
  .lede {
    font-size: 13px; line-height: 1.6;
    color: #cfc1ec; margin: 0 0 8px;
  }
  .email {
    color: #b48cff;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    word-break: break-all;
  }
  .note {
    font-family: ui-monospace, monospace;
    font-size: 11px; color: #9d8cc4;
    margin: 20px 0 0; line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="label">Check your email</div>
    <div class="panel">
      <div class="icon-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 7l9 6 9-6M5 4h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="#b48cff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Check your <span class="accent">inbox.</span></h1>
      <p class="lede">We sent a one-time link to</p>
      <p class="email">{{email}}</p>
      <p class="note">Link expires in 24 hours.<br />Check spam if it doesn't arrive in a few minutes.</p>
    </div>
  </div>
</body>
</html>
