<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verum Signal — Account</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%230A0A0F'/><path d='M8 32 Q16 16 24 32 Q32 48 40 32 Q48 16 56 32' fill='none' stroke='%23a855f7' stroke-width='3' stroke-linecap='round'/><circle cx='58' cy='32' r='4' fill='%23ec4899'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0A0A0F;
    font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    color: rgba(255,255,255,0.92);
  }

  .stage { width: 100%; max-width: 480px; }

  /* ── Nav logo ── */
  .top-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .logo {
    display: inline-flex; align-items: center; gap: 8px;
    text-decoration: none;
    font-size: 12px; letter-spacing: 0.18em; color: #fff; font-weight: 600;
  }
  .logo em { font-style: italic; color: #c084fc; font-weight: 400; }

  /* ── Panel ── */
  .panel {
    background: #13131c;
    border: 0.5px solid rgba(255,255,255,0.09);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-header {
    padding: 24px 28px 20px;
    border-bottom: 0.5px solid rgba(255,255,255,0.07);
  }
  .eyebrow {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,255,255,0.35); margin-bottom: 6px;
  }
  .email-line {
    font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.92);
    word-break: break-all;
  }

  /* ── Section ── */
  .section {
    padding: 20px 28px;
    border-bottom: 0.5px solid rgba(255,255,255,0.07);
  }
  .section:last-child { border-bottom: none; }

  .section-label {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 14px;
  }

  /* ── Tier badge ── */
  .tier-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .tier-badge {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 4px 10px; border-radius: 100px;
  }
  .tier-badge.free {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.45);
    border: 0.5px solid rgba(255,255,255,0.12);
  }
  .tier-badge.pro {
    background: rgba(168,85,247,0.15);
    color: #c084fc;
    border: 0.5px solid rgba(168,85,247,0.35);
  }
  .tier-badge.scale {
    background: rgba(236,72,153,0.12);
    color: #f472b6;
    border: 0.5px solid rgba(236,72,153,0.3);
  }

  /* ── Quota bar ── */
  .quota-label {
    font-size: 12px; color: rgba(255,255,255,0.45);
    margin-bottom: 8px; display: flex; justify-content: space-between;
  }
  .quota-label span { font-family: ui-monospace, monospace; color: rgba(255,255,255,0.7); }
  .quota-track {
    height: 4px; background: rgba(255,255,255,0.07);
    border-radius: 2px; overflow: hidden; margin-bottom: 6px;
  }
  .quota-fill {
    height: 100%; border-radius: 2px;
    background: #a855f7;
    transition: width 0.4s ease;
  }
  .quota-fill.warn { background: #f59e0b; }
  .quota-fill.full { background: #f87171; }
  .quota-reset {
    font-family: ui-monospace, monospace;
    font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 0.04em;
  }

  /* ── No subscription state ── */
  .no-sub {
    font-size: 13px; color: rgba(255,255,255,0.35);
    font-style: italic;
  }

  /* ── Upgrade CTA ── */
  .upgrade-block {
    background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(236,72,153,0.05));
    border: 0.5px solid rgba(168,85,247,0.25);
    border-radius: 10px;
    padding: 16px 18px;
    margin-top: 4px;
  }
  .upgrade-block p {
    font-size: 13px; color: rgba(255,255,255,0.55);
    margin: 0 0 12px; line-height: 1.55; font-weight: 300;
  }
  .btn-upgrade {
    display: inline-block;
    background: #a855f7; color: #fff;
    border: none; border-radius: 8px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    text-decoration: none; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-upgrade:hover { background: #9333ea; }

  /* ── Sign out ── */
  .signout-section {
    padding: 16px 28px;
    border-top: 0.5px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
  }
  .signout-meta {
    font-family: ui-monospace, monospace;
    font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.04em;
  }
  .btn-signout {
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: rgba(255,255,255,0.45);
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .btn-signout:hover {
    border-color: rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
  }

  /* ── Auth error page ── */
  .error-panel {
    text-align: center; padding: 48px 28px;
  }
  .error-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(248,113,113,0.1);
    border: 0.5px solid rgba(248,113,113,0.3);
    margin: 0 auto 20px;
    display: grid; place-items: center;
    font-size: 20px;
  }
  .error-panel h2 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 24px; font-weight: 400;
    margin: 0 0 10px; color: rgba(255,255,255,0.9);
  }
  .error-panel p {
    font-size: 14px; color: rgba(255,255,255,0.45);
    margin: 0 0 24px; line-height: 1.6; font-weight: 300;
  }
  .btn-ghost {
    display: inline-block;
    background: transparent;
    border: 0.5px solid rgba(168,85,247,0.4);
    border-radius: 8px; padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    color: #c084fc; text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .btn-ghost:hover {
    border-color: #a855f7;
    background: rgba(168,85,247,0.06);
  }
</style>
</head>
<body>
<div class="stage">

  <div class="top-nav">
    <a href="/" class="logo">
      <svg width="32" height="22" viewBox="0 0 54 40" fill="none">
        <path d="M3 20 Q 11 4, 18 20 T 33 20" stroke="#a855f7" stroke-width="3.2" fill="none" stroke-linecap="round"/>
        <circle cx="37" cy="18" r="4.2" fill="#ec4899"/>
      </svg>
      VERUM <em>SIGNAL</em>
    </a>
  </div>

  {{content}}

</div>

<script>
document.getElementById('signout-btn') && document.getElementById('signout-btn').addEventListener('click', function() {
  fetch('/auth/logout', { method: 'POST' })
    .then(function() { window.location.href = '/'; });
});
</script>
<script src="/static/vs-track.js" defer></script>
</body>
</html>
